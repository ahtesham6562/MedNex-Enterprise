<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      🏥 MEDNEX
      <span>ENTERPRISE</span>
    </div>
    <div class="user-info">
      <p class="username">{{ username }}</p>
      <span class="role-badge">{{ role }}</span>
      <p class="tenant">{{ tenant }}</p>
    </div>

    <nav>
      <ul>
        @for (item of filteredMenu; track item.route) {
          <li>
            <a [routerLink]="item.route">
              {{ item.icon }} {{ item.label }}
            </a>
          </li>
        }
      </ul>
    </nav>

    <button class="logout-btn" (click)="logout()">🚪 LOGOUT</button>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <h1>Welcome, {{ username }}! 👋</h1>
    <p>Role: <strong>{{ role }}</strong> | Tenant: <strong>{{ tenant }}</strong></p>

    <div class="cards">
      <div class="card">
        <h3>🧑‍⚕️ Patients</h3>
        <p>Manage patient records</p>
        <a [routerLink]="'/patients'">View Patients →</a>
      </div>
    </div>
  </main>

</div>
