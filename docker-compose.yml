version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hospital_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ahtesham@6562
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hospital_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ahtesham@6562
      JWT_SECRET: mysecretkeymysecretkeymysecretkey123456
      JWT_EXPIRATION: 3600000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend/hospital-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
